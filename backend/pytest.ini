[pytest]
# Pytest configuration for Songs-Gen automation pipeline

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 6.0

# Test paths
testpaths = tests

# Output options
addopts =
    # Verbose output with test names
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers - fail on unknown markers
    --strict-markers
    # Strict config - fail on config errors
    --strict-config
    # Coverage options
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    # Disable warnings summary (enable if needed)
    # --disable-warnings
    # Async testing
    --asyncio-mode=auto

# Markers for test categorization
markers =
    unit: Unit tests - fast, isolated tests
    integration: Integration tests - test component interactions
    e2e: End-to-end tests - full workflow tests
    slow: Tests that take significant time
    auth: Authentication and authorization tests
    api: API endpoint tests
    database: Database-related tests
    service: Service layer tests
    worker: Background worker tests
    watcher: File watcher tests
    youtube: YouTube integration tests
    suno: Suno integration tests (manual only - requires browser)
    audio: Audio analysis tests
    video: Video generation tests

# Asyncio configuration
asyncio_mode = auto

# Log output
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    # Ignore SQLAlchemy warnings
    ignore:.*Dialect sqlite.*:DeprecationWarning

# Coverage settings (also see .coveragerc)
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
